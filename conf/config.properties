# Single-node coordinator+worker. For multi-node (production-shape) deployments
# split into two config files and set node-scheduler.include-coordinator=false
# on the coordinator.
coordinator=true
node-scheduler.include-coordinator=true
http-server.http.port=8080
discovery.uri=http://localhost:8080

# Query memory limits -- conservative for a POC single-node box.
query.max-memory=2GB
query.max-memory-per-node=1GB
